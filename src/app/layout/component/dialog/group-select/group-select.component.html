<div class="mb-4">
    <p-floatlabel>
        <p-select
            [inputId]="uniqueId"
            [options]="filteredItems"

            [(ngModel)]="internalValue"
            (onChange)="onValueChange($event.value)"
            (onBlur)="onTouched()"
            (onShow)="onDropdownShow()"

            optionLabel="name"
            [loading]="loading"

            [disabled]="isDisabled || disable"

            [showClear]="true"
            [group]="true"
            [filter]="true"
            filterBy="name"
            [appendTo]="'body'"
            [style]="{ width: '100%' }"
            [required]="true"

            [emptyMessage]="emptyFilterMessage"
            [emptyFilterMessage]="emptyFilterMessage"
            [ngClass]="{ 'ng-invalid ng-dirty': submitted && !internalValue }"
        >
            <ng-template pTemplate="filter">
                <div class="p-1">
                    <p-iconfield class="w-full">
                        <p-inputicon class="pi pi-search" />
                        <input #filterInput type="text" pInputText class="w-full" (input)="onFilterInput($event)" (keydown)="onFilterKeyDown($event)" placeholder="Поиск..." role="searchbox" autocomplete="off" />
                    </p-iconfield>
                </div>
            </ng-template>
            <ng-template let-group pTemplate="group">
                <div class="flex items-center">
                    <span>{{ group.name }}</span>
                </div>
            </ng-template>
        </p-select>

        <label [for]="uniqueId">{{ label }}</label>
    </p-floatlabel>

    @if (submitted && !internalValue) {
        <p-message class="mt-2" severity="error" variant="simple" size="small">{{ errorMessage }}</p-message>
    }
</div>
