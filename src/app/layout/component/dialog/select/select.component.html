<div class="mb-4">
    <p-floatlabel>
        <p-select
            [inputId]="uniqueId"
            [options]="items"

            [(ngModel)]="internalValue"
            (onChange)="onValueChange($event.value)"
            (onBlur)="onTouched()"

            optionLabel="name"
            [loading]="loading"

            [disabled]="isDisabled || disable"

            [showClear]="showClear"
            [filter]="filter"
            [appendTo]="'body'"
            [style]="{ width: '100%' }"
            [required]="required"

            [ngClass]="{ 'ng-invalid ng-dirty': submitted && required && !internalValue }"
        >
        </p-select>

        <label [for]="uniqueId">{{ label }}</label>
    </p-floatlabel>

    @if (submitted && required && !internalValue) {
        <p-message class="mt-2" severity="error" variant="simple" size="small">{{ errorMessage }}</p-message>
    }
</div>
