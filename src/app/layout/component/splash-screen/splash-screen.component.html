@if (isVisible) {
    <div class="splash-screen" [@fadeOut]="animationState">
        <!-- Background grid -->
        <div class="bg-grid"></div>

        <!-- Expanding rings -->
        <div class="rings-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
        </div>

        <div class="splash-content">
            <!-- Logo -->
            <div class="logo-container">
                <img src="/images/logo-x.png" alt="МолокоПром" class="company-logo">
            </div>

            <!-- Orbiting dots -->
            <div class="orbit-container">
                <div class="orbit orbit-1">
                    <div class="orbit-dot"></div>
                </div>
                <div class="orbit orbit-2">
                    <div class="orbit-dot"></div>
                </div>
                <div class="orbit orbit-3">
                    <div class="orbit-dot"></div>
                </div>
                <!-- Center icon -->
                <div class="center-icon">
                    <i class="pi pi-building"></i>
                </div>
            </div>

            <!-- Company name -->
            <div class="company-name">
                <span class="highlight">АО</span> МолокоПром
            </div>

            <!-- Tagline -->
            <div class="tagline">Планшет Председателя</div>
        </div>

        <!-- Skip button -->
        <button class="skip-btn" (click)="skipSplash()">
            Пропустить <i class="pi pi-arrow-right"></i>
        </button>

        <!-- Loading bar -->
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>
}
