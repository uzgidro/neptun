<div class="card">
    <h2>{{ 'GES_REPORT.TITLE' | translate }}</h2>

    <p-tabs [value]="activeTab" (valueChange)="onTabChange($event)">
        <p-tablist>
            @for (tab of tabs; track tab.key) {
                <p-tab [value]="tab.key">{{ tab.label | translate }}</p-tab>
            }
        </p-tablist>
        <p-tabpanels>
            @if (isScOrRais) {
                <p-tabpanel value="config">
                    <app-ges-config-tab />
                </p-tabpanel>
            }
            <p-tabpanel value="data-entry">
                <app-ges-data-entry-tab />
            </p-tabpanel>
            @if (isScOrRais) {
                <p-tabpanel value="plans">
                    <app-ges-plans-tab />
                </p-tabpanel>
            }
        </p-tabpanels>
    </p-tabs>
</div>
