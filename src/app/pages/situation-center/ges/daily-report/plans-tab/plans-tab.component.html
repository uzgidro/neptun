<div class="flex align-items-center gap-3 mb-3">
    <p-inputNumber
        [(ngModel)]="selectedYear"
        [showButtons]="true"
        [min]="2000"
        [max]="2100"
        [useGrouping]="false"
        (ngModelChange)="onYearChange()"
    />
    <p-button
        [label]="'GES_REPORT.SAVE' | translate"
        icon="pi pi-save"
        [loading]="saving"
        [disabled]="!hasChanges || saving"
        (onClick)="savePlans()"
    />
</div>

<p-table
    [value]="planItems"
    [loading]="loading"
    styleClass="p-datatable-sm p-datatable-gridlines"
    [scrollable]="true"
    scrollHeight="flex"
>
    <ng-template pTemplate="header">
        <tr>
            <th style="min-width: 160px">{{ 'GES_REPORT.STATION_NAME' | translate }}</th>
            <th *ngFor="let key of monthKeys" style="min-width: 100px; text-align: center">
                {{ ('COMMON.MONTHS.' + key) | translate }}
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
        @if (item.type === 'header') {
            <tr class="cursor-pointer" (click)="toggleCascade(item.cascade_name)">
                <td [attr.colspan]="13" class="font-bold" style="background-color: var(--p-primary-100); color: var(--p-primary-700)">
                    <div class="flex items-center gap-2">
                        <i class="pi text-sm"
                           [class.pi-chevron-down]="!collapsedCascades.has(item.cascade_name)"
                           [class.pi-chevron-right]="collapsedCascades.has(item.cascade_name)"></i>
                        {{ item.cascade_name }}
                    </div>
                </td>
            </tr>
        } @else {
            <tr [style.display]="collapsedCascades.has(item.row.config.cascade_name) ? 'none' : ''">
                <td>{{ item.row.config.organization_name }}</td>
                <td *ngFor="let key of monthKeys; let i = index" style="padding: 4px 8px">
                    <p-inputNumber
                        [(ngModel)]="item.row.months[i]"
                        [minFractionDigits]="0"
                        [maxFractionDigits]="3"
                        [useGrouping]="false"
                        [style]="{ width: '100%' }"
                        [inputStyle]="{ width: '100%', background: item.row.dirty[i] ? 'var(--yellow-100)' : '' }"
                        (onInput)="onMonthChange(item.row, i)"
                        (onBlur)="onMonthChange(item.row, i)"
                    />
                </td>
            </tr>
        }
    </ng-template>
    <ng-template pTemplate="emptymessage">
        <tr>
            <td [attr.colspan]="13" class="text-center">
                {{ 'GES_REPORT.NO_DATA' | translate }}
            </td>
        </tr>
    </ng-template>
</p-table>
