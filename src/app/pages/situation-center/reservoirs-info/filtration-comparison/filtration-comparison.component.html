<div class="flex flex-col gap-4">
    <!-- Toolbar -->
    <div class="flex items-center justify-between gap-4 sticky top-0 z-10 bg-surface-0 dark:bg-surface-900 py-3">
        <p-datePicker
            [(ngModel)]="selectedDate"
            (onSelect)="onDateChange($event)"
            dateFormat="dd.mm.yy"
            [showIcon]="true" />

        <div class="flex gap-2">
            <p-button
                [label]="'FILTRATION.EXPORT_EXCEL' | translate"
                icon="pi pi-file-excel"
                [disabled]="loadingSimilarDates || downloading !== null || !hasExportDates"
                [loading]="downloading === 'excel'"
                severity="success"
                (onClick)="download('excel')" />
            <p-button
                [label]="'FILTRATION.EXPORT_PDF' | translate"
                icon="pi pi-file-pdf"
                [disabled]="loadingSimilarDates || downloading !== null || !hasExportDates"
                [loading]="downloading === 'pdf'"
                severity="danger"
                (onClick)="download('pdf')" />
            <p-button
                [label]="'COMMON.SAVE' | translate"
                icon="pi pi-save"
                [disabled]="(!form?.dirty && !hasPendingClears) || saving"
                [loading]="saving"
                (onClick)="save()" />
        </div>
    </div>

    <!-- Loading similar dates -->
    @if (loadingSimilarDates) {
        <div class="flex justify-center p-8">
            <i class="pi pi-spin pi-spinner text-2xl"></i>
        </div>
    }

    <!-- Empty state -->
    @if (!loadingSimilarDates && similarDates.length === 0) {
        <p-message severity="info" [text]="'FILTRATION.NO_DATA' | translate" />
    }

    <!-- Organization cards -->
    @if (!loadingSimilarDates && similarDates.length > 0) {
        @for (orgSimilar of similarDates; track orgSimilar.organization_id) {
            <app-org-comparison-card
                [org]="getOrgComparison(orgSimilar.organization_id) ?? null"
                [similarDates]="orgSimilar.similar_dates"
                [orgName]="orgSimilar.organization_name"
                [referenceLevel]="orgSimilar.reference_level"
                [referenceVolume]="orgSimilar.reference_volume"
                [selectedFilterDate]="getOrgSelection(orgSimilar.organization_id).filterDate"
                [selectedPiezoDate]="getOrgSelection(orgSimilar.organization_id).piezoDate"
                [loadingData]="isOrgLoading(orgSimilar.organization_id)"
                [orgFormGroup]="getOrgFormGroup(orgSimilar.organization_id)"
                (filterDateChange)="onFilterDateChange(orgSimilar.organization_id, $event)"
                (piezoDateChange)="onPiezoDateChange(orgSimilar.organization_id, $event)"
                (filterDateClear)="onFilterDateClear(orgSimilar.organization_id)"
                (piezoDateClear)="onPiezoDateClear(orgSimilar.organization_id)" />
        }
    }
</div>

<p-confirmDialog />
